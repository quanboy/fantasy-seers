spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fantasyseers_db}
    username: ${SPRING_DATASOURCE_USERNAME:fantasyseers}
    password: ${SPRING_DATASOURCE_PASSWORD:fantasyseers_secret}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

readonly:
  datasource:
    url: ${READONLY_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fantasyseers_db}}
    username: ${READONLY_DB_USERNAME:${SPRING_DATASOURCE_USERNAME:fantasyseers}}
    password: ${READONLY_DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:fantasyseers_secret}}

jwt:
  secret: ${JWT_SECRET:fantasy-seers-super-secret-jwt-key-change-in-production}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}

logging:
  level:
    com.fantasyseers: DEBUG
    org.springframework.security: INFO
